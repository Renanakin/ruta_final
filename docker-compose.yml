name: ruta-del-nido

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3003:3002"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/database.sqlite:/app/database.sqlite
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:3003
    ports:
      - "5174:80"
    depends_on:
      - backend
    restart: unless-stopped
