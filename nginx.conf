server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy analytics and api if needed, but here we assume the frontend 
    # connects to the backend via the browser (localhost:3002)
    # as defined in the .env VITE_API_BASE_URL.

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
